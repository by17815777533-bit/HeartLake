services:
  postgres:
    image: postgres:16
    container_name: heartlake-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-heartlake}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-HeartLake}
    ports:
      - "5432:5432"
    volumes:
      - heartlake_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-heartlake}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: heartlake-redis
    restart: unless-stopped
    command: >
      sh -c "redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-HeartLake}"
    ports:
      - "6379:6379"
    volumes:
      - heartlake_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-HeartLake} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: heartlake-ollama
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "11434:11434"
    volumes:
      - heartlake_ollama_data:/root/.ollama

  backend:
    build:
      context: ./backend
    container_name: heartlake-backend
    restart: unless-stopped
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-heartlake}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-HeartLake}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-HeartLake}
      PASETO_KEY: ${PASETO_KEY:-HeartLakeHeartLakeHeartLakeHeartLake}
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: HeartLake
      ADMIN_PASETO_KEY: ${ADMIN_PASETO_KEY:-HeartLakeAdminHeartLakeAdminHeartLake}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-63f7e17aded5f09343ecf7bf37e61966c748a6aeaf4c3984fe97cf5951d5b14b:505bb12f96bcfe1b7276f874c80a70f1612517840b0495b60e301d25164b57d734fb06200fb193231512efb20e87c1440c1fe670d060ed9212cdbfaf1dd78fe6}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_BASE_URL: ${AI_BASE_URL:-http://ollama:11434}
      AI_MODEL: ${AI_MODEL:-heartlake-qwen}
      AI_TIMEOUT: ${AI_TIMEOUT:-30}
      PUBLIC_API_URL: http://localhost:8080
      PUBLIC_WS_URL: ws://localhost:8080
      ENV_MODE: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  admin:
    build:
      context: ./admin
    container_name: heartlake-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  heartlake_postgres_data:
  heartlake_redis_data:
  heartlake_ollama_data:
