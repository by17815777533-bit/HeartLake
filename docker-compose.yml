services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: ${DB_NAME:-heartlake}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-heartlake}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - heartlake-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # Redis 缓存
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - heartlake-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # Ollama 本地AI模型服务
  ollama:
    image: ollama/ollama:0.6.2
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - heartlake-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  # C++ 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_PROVIDER: ollama
      AI_BASE_URL: http://ollama:11434
      AI_MODEL: heartlake-qwen
      AI_TIMEOUT: 30
      ENV_MODE: production
      EDGE_AI_ONNX_ENABLED: "true"
      EDGE_AI_MODEL_PATH: /app/models/sentiment_zh.onnx
      EDGE_AI_VOCAB_PATH: /app/models/vocab.txt
      EDGE_AI_ONNX_THREADS: "2"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
      - backend-models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - heartlake-net
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "2.0"

  # Vue3 管理后台
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - heartlake-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  # Nginx 反向代理
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      backend:
        condition: service_healthy
      admin:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - heartlake-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  backend-uploads:
    driver: local
  backend-logs:
    driver: local
  backend-models:
    driver: local
  ollama-models:
    driver: local

networks:
  heartlake-net:
    driver: bridge
