services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: heartlake-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-heartlake}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "${POSTGRES_BIND_HOST:-0.0.0.0}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - heartlake_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-heartlake}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: heartlake-redis
    restart: unless-stopped
    command: >
      sh -c "redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    ports:
      - "${REDIS_BIND_HOST:-0.0.0.0}:${REDIS_PORT:-6379}:6379"
    volumes:
      - heartlake_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:?REDIS_PASSWORD is required} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: heartlake-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_BIND_HOST:-0.0.0.0}:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - heartlake_ollama_data:/root/.ollama

  backend:
    build:
      context: ./backend
      args:
        BUILD_JOBS: ${BACKEND_BUILD_JOBS:-2}
    container_name: heartlake-backend
    restart: unless-stopped
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      SERVER_THREADS: ${SERVER_THREADS:-4}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-heartlake}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-10}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:5173,http://localhost:3000,http://localhost:8080}
      PASETO_KEY: ${PASETO_KEY:?PASETO_KEY is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ""
      ADMIN_PASETO_KEY: ${ADMIN_PASETO_KEY:?ADMIN_PASETO_KEY is required}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?ADMIN_PASSWORD_HASH is required}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-http://ollama:11434}
      AI_MODEL: ${AI_MODEL:-heartlake-qwen}
      AI_TIMEOUT: ${AI_TIMEOUT:-30}
      EDGE_AI_ONNX_ENABLED: ${EDGE_AI_ONNX_ENABLED:-auto}
      EDGE_AI_MODEL_PATH: ${EDGE_AI_MODEL_PATH:-./models}
      EDGE_AI_VOCAB_PATH: ${EDGE_AI_VOCAB_PATH:-./models/vocab.txt}
      EDGE_AI_ONNX_THREADS: ${EDGE_AI_ONNX_THREADS:-2}
      EDGE_AI_ONNX_SESSION_POOL: ${EDGE_AI_ONNX_SESSION_POOL:-1}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
      PUBLIC_WS_URL: ${PUBLIC_WS_URL:-ws://localhost:8080/ws/broadcast}
      ENV_MODE: ${ENV_MODE:-development}
      EMBEDDING_WARMUP_ON_BOOT: ${EMBEDDING_WARMUP_ON_BOOT:-false}
      ENABLE_LAKE_GOD_GUARDIAN: ${ENABLE_LAKE_GOD_GUARDIAN:-true}
      ENABLE_EMOTION_TRACKING: ${ENABLE_EMOTION_TRACKING:-true}
      ENABLE_USER_FOLLOWUP: ${ENABLE_USER_FOLLOWUP:-true}
      ENABLE_WS_HEARTBEAT: ${ENABLE_WS_HEARTBEAT:-true}
      REALTIME_QUIC_ENABLED: ${REALTIME_QUIC_ENABLED:-true}
    volumes:
      - heartlake_backend_config:/app/config
      - heartlake_backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_BIND_HOST:-0.0.0.0}:${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  admin:
    build:
      context: ./admin
    container_name: heartlake-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${ADMIN_BIND_HOST:-0.0.0.0}:${ADMIN_PORT:-5173}:8080"

  gateway:
    image: nginx:1.27-alpine
    container_name: heartlake-gateway
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      admin:
        condition: service_started
    volumes:
      - ./deploy/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${GATEWAY_BIND_HOST:-0.0.0.0}:${GATEWAY_PORT:-3000}:80"

volumes:
  heartlake_postgres_data:
  heartlake_redis_data:
  heartlake_ollama_data:
  heartlake_backend_config:
  heartlake_backend_uploads:
