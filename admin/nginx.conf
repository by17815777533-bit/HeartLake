# 速率限制区域：每个IP 10请求/秒，共享内存10MB
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=10r/s;

# gzip 压缩
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # 安全响应头（统一在 server 块定义，子 location 不再单独 add_header 以避免继承覆盖）
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 2m;

    # 速率限制：突发20个请求排队，超出返回429
    limit_req zone=admin_limit burst=20 nodelay;
    limit_req_status 429;

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长缓存（不使用 add_header 避免覆盖 server 级安全头）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        # Cache-Control 通过 expires 指令自动设置，不额外 add_header
    }

    # 隐藏文件禁止访问
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
