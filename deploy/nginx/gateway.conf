server {
  listen 80;
  server_name _;

  client_max_body_size 20m;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }

  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  location /chat/ {
    proxy_pass http://backend:8080/chat/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }

  location /admin/ {
    proxy_pass http://admin:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # 管理后台产物默认使用绝对路径 /assets/*，需要显式转发到 admin 服务
  location /assets/ {
    proxy_pass http://admin:8080/assets/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = / {
    default_type text/html;
    return 200 '<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><title>HeartLake Gateway</title><style>body{font-family:Arial,sans-serif;margin:40px;background:#fffdf7;color:#2d2a26}h1{font-size:28px}code{background:#f4efe4;padding:2px 6px;border-radius:4px}</style></head><body><h1>HeartLake 网关已就绪</h1><p>管理后台：<code>/admin/</code></p><p>后端接口：<code>/api/</code></p><p>实时通道：<code>/chat/</code></p></body></html>';
  }
}
