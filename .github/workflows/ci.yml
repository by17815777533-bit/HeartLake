name: HeartLake CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ==================== 后端 C++ 构建与测试 ====================
  backend:
    name: Backend (C++20)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: heartlake_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ git \
            libssl-dev libcurl4-openssl-dev libjsoncpp-dev \
            libpq-dev libhiredis-dev \
            libgtest-dev libc-ares-dev uuid-dev \
            postgresql-client

      - name: Cache Drogon
        uses: actions/cache@v4
        id: cache-drogon
        with:
          path: /usr/local/lib/cmake/Drogon
          key: drogon-v1.9.11-${{ runner.os }}

      - name: Build Drogon
        if: steps.cache-drogon.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v1.9.11 https://github.com/drogonframework/drogon.git /tmp/drogon
          cd /tmp/drogon && git submodule update --init
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_EXAMPLES=OFF -DBUILD_CTL=OFF -DBUILD_ORM=OFF
          make -j$(nproc) && sudo make install

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: backend/build
          key: cmake-build-${{ runner.os }}-${{ hashFiles('backend/CMakeLists.txt', 'backend/src/**', 'backend/include/**') }}
          restore-keys: |
            cmake-build-${{ runner.os }}-

      - name: Build HeartLake
        working-directory: backend
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Run database migrations
        working-directory: backend
        env:
          PGPASSWORD: testpassword
        run: |
          for f in $(ls migrations/*.sql | sort); do
            echo "Applying $(basename $f)..."
            psql -h localhost -U postgres -d heartlake_test -f "$f"
          done

      - name: Run tests
        working-directory: backend/build
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: heartlake_test
          DB_USER: postgres
          DB_PASSWORD: testpassword
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          PASETO_KEY: ci-test-paseto-key-32bytes-long!!
          ADMIN_PASETO_KEY: ci-admin-paseto-key-32bytes-long!
        run: ctest --output-on-failure --timeout 60

  # ==================== 管理后台前端构建与测试 ====================
  admin-frontend:
    name: Admin Frontend (Vue 3)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Run tests
        working-directory: admin
        run: npm test

      - name: Build
        working-directory: admin
        run: npm run build

  # ==================== Docker 构建验证 ====================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, admin-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t heartlake-backend ./backend

      - name: Build admin image
        working-directory: admin
        run: |
          npm install && npm run build
          docker build -t heartlake-admin .

  # ==================== 安全扫描 ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks 需要完整历史

      # ---- C++ 静态分析 (cppcheck) ----
      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck on backend
        working-directory: backend
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --suppress=useStlAlgorithm \
            --inline-suppr \
            --std=c++20 \
            -I include/ \
            --quiet \
            src/ include/

      # ---- 秘钥泄露检测 (gitleaks) ----
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- npm 依赖漏洞扫描 (admin) ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit admin dependencies
        working-directory: admin
        run: |
          npm ci
          npm audit --audit-level=high || true
          # 输出已知高危漏洞摘要，不阻塞 CI（audit-level=critical 时才失败）
          npm audit --audit-level=critical

      # ---- Rust 依赖审计 (QUIC 网关) ----
      - name: Install cargo-audit
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          cargo install cargo-audit

      - name: Audit QUIC gateway dependencies
        working-directory: backend/quic_gateway
        run: |
          source "$HOME/.cargo/env"
          cargo audit

  # ==================== 代码质量检查 ====================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets (fallback grep)
        run: |
          echo "Checking for hardcoded secrets..."
          FOUND=0
          # OpenAI / Anthropic API keys
          grep -rn "sk-[a-zA-Z0-9]\{32,\}" \
            --include="*.cpp" --include="*.h" --include="*.js" --include="*.vue" \
            --include="*.ts" --include="*.dart" --include="*.rs" \
            --include="*.json" --include="*.yml" --include="*.yaml" --include="*.env" \
            . && FOUND=1
          # AWS access key IDs
          grep -rn "AKIA[0-9A-Z]\{16\}" \
            --include="*.cpp" --include="*.h" --include="*.js" --include="*.vue" \
            --include="*.ts" --include="*.dart" --include="*.rs" \
            --include="*.json" --include="*.yml" --include="*.yaml" --include="*.env" \
            . && FOUND=1
          # GitHub personal access tokens / OAuth tokens
          grep -rn "\(ghp_\|gho_\|ghs_\|ghr_\)[a-zA-Z0-9]\{36,\}" \
            --include="*.cpp" --include="*.h" --include="*.js" --include="*.vue" \
            --include="*.ts" --include="*.dart" --include="*.rs" \
            --include="*.json" --include="*.yml" --include="*.yaml" --include="*.env" \
            . && FOUND=1
          if [ "$FOUND" -eq 1 ]; then
            echo "ERROR: Possible secrets found in source code!"
            exit 1
          fi
          echo "No secrets found."

      - name: Check .env not committed
        run: |
          if git ls-files --error-unmatch backend/.env 2>/dev/null; then
            echo "ERROR: backend/.env should not be committed!"
            exit 1
          fi
          echo ".env file is properly gitignored."
