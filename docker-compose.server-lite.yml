services:
  postgres:
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c wal_buffers=16MB
      -c min_wal_size=80MB
      -c max_wal_size=512MB
      -c max_connections=40
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    command: >
      sh -c "redis-server --appendonly yes --appendfsync everysec --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 128mb --maxmemory-policy allkeys-lru --tcp-keepalive 60"
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      args:
        BUILD_JOBS: ${BACKEND_BUILD_JOBS:-1}
    environment:
      SERVER_THREADS: ${SERVER_THREADS:-2}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-4}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-4}
      REDIS_MAX_POOL_SIZE: ${REDIS_MAX_POOL_SIZE:-8}
      LOG_LEVEL: ${LOG_LEVEL:-WARN}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ""
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?ADMIN_PASSWORD_HASH is required}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_BASE_URL: ${AI_BASE_URL:-http://127.0.0.1:11434}
      AI_MODEL: ${AI_MODEL:-heartlake-qwen}
      AI_TIMEOUT: ${AI_TIMEOUT:-15}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES:-1}
      AI_CIRCUIT_BREAKER_FAILURES: ${AI_CIRCUIT_BREAKER_FAILURES:-2}
      AI_CIRCUIT_BREAKER_COOLDOWN_SEC: ${AI_CIRCUIT_BREAKER_COOLDOWN_SEC:-60}
      AI_SEMANTIC_CACHE_MAX_SIZE: ${AI_SEMANTIC_CACHE_MAX_SIZE:-2000}
      AI_SENTIMENT_CACHE_MAX_SIZE: ${AI_SENTIMENT_CACHE_MAX_SIZE:-8000}
      AI_OLLAMA_FORCE_GPU: ${AI_OLLAMA_FORCE_GPU:-false}
      AI_OLLAMA_NUM_THREAD: ${AI_OLLAMA_NUM_THREAD:-2}
      AI_OLLAMA_NUM_CTX: ${AI_OLLAMA_NUM_CTX:-2048}
      EMBEDDING_CACHE_SIZE: ${EMBEDDING_CACHE_SIZE:-6000}
      EDGE_AI_SENTIMENT_CACHE_MAX_SIZE: ${EDGE_AI_SENTIMENT_CACHE_MAX_SIZE:-4096}
      EDGE_AI_ONNX_ENABLED: ${EDGE_AI_ONNX_ENABLED:-false}
      EDGE_AI_ONNX_THREADS: ${EDGE_AI_ONNX_THREADS:-1}
      PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
      PUBLIC_WS_URL: ${PUBLIC_WS_URL:?PUBLIC_WS_URL is required}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:?CORS_ALLOWED_ORIGIN is required}
      ENV_MODE: production
      EMBEDDING_WARMUP_ON_BOOT: ${EMBEDDING_WARMUP_ON_BOOT:-false}
      ENABLE_LAKE_GOD_GUARDIAN: ${ENABLE_LAKE_GOD_GUARDIAN:-false}
      ENABLE_EMOTION_TRACKING: ${ENABLE_EMOTION_TRACKING:-false}
      ENABLE_USER_FOLLOWUP: ${ENABLE_USER_FOLLOWUP:-false}
      LAKE_GOD_STARTUP_DELAY_SEC: ${LAKE_GOD_STARTUP_DELAY_SEC:-300}
      LAKE_GOD_SCAN_INTERVAL_MINUTES: ${LAKE_GOD_SCAN_INTERVAL_MINUTES:-60}
      LAKE_GOD_ZERO_INTERACTION_THRESHOLD_HOURS: ${LAKE_GOD_ZERO_INTERACTION_THRESHOLD_HOURS:-6}
      LAKE_GOD_SCAN_BATCH_SIZE: ${LAKE_GOD_SCAN_BATCH_SIZE:-1}
      EMOTION_TRACKING_STARTUP_DELAY_SEC: ${EMOTION_TRACKING_STARTUP_DELAY_SEC:-300}
      EMOTION_TRACKING_SCAN_INTERVAL_MINUTES: ${EMOTION_TRACKING_SCAN_INTERVAL_MINUTES:-60}
      USER_FOLLOWUP_STARTUP_DELAY_SEC: ${USER_FOLLOWUP_STARTUP_DELAY_SEC:-600}
      USER_FOLLOWUP_SCAN_INTERVAL_HOURS: ${USER_FOLLOWUP_SCAN_INTERVAL_HOURS:-12}
      ENABLE_WS_HEARTBEAT: ${ENABLE_WS_HEARTBEAT:-true}
      REALTIME_QUIC_ENABLED: ${REALTIME_QUIC_ENABLED:-false}
    logging:
      options:
        max-size: "20m"
        max-file: "5"

  admin:
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  gateway:
    logging:
      options:
        max-size: "10m"
        max-file: "3"
