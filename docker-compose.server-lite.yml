services:
  backend:
    build:
      args:
        BUILD_JOBS: ${BACKEND_BUILD_JOBS:-1}
    environment:
      SERVER_THREADS: ${SERVER_THREADS:-2}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-4}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-4}
      LOG_LEVEL: ${LOG_LEVEL:-WARN}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ""
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?ADMIN_PASSWORD_HASH is required}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_BASE_URL: ${AI_BASE_URL:-http://127.0.0.1:11434}
      AI_MODEL: ${AI_MODEL:-heartlake-qwen}
      AI_TIMEOUT: ${AI_TIMEOUT:-5}
      PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
      PUBLIC_WS_URL: ${PUBLIC_WS_URL:?PUBLIC_WS_URL is required}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:?CORS_ALLOWED_ORIGIN is required}
      ENV_MODE: production
      EMBEDDING_WARMUP_ON_BOOT: ${EMBEDDING_WARMUP_ON_BOOT:-false}
      ENABLE_LAKE_GOD_GUARDIAN: ${ENABLE_LAKE_GOD_GUARDIAN:-false}
      ENABLE_EMOTION_TRACKING: ${ENABLE_EMOTION_TRACKING:-false}
      ENABLE_USER_FOLLOWUP: ${ENABLE_USER_FOLLOWUP:-false}
      ENABLE_WS_HEARTBEAT: ${ENABLE_WS_HEARTBEAT:-true}
      REALTIME_QUIC_ENABLED: ${REALTIME_QUIC_ENABLED:-false}
